<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:24px;font-family:var(--font-body)">
  <div style="background:linear-gradient(160deg,#1B4A55 0%,#173F49 55%,#0E2C34 100%);border-radius:20px;padding:30px;color:var(--warm-cream);position:relative;overflow:hidden;min-height:140px">
    <!-- subtle particle dots -->
    <div style="position:absolute;inset:0;pointer-events:none">
      <div style="position:absolute;top:18%;left:12%;width:2px;height:2px;background:var(--warm-cream);opacity:.35;border-radius:50%"></div>
      <div style="position:absolute;top:42%;left:78%;width:1.5px;height:1.5px;background:var(--warm-cream);opacity:.3;border-radius:50%"></div>
      <div style="position:absolute;top:28%;left:46%;width:1.5px;height:1.5px;background:var(--warm-cream);opacity:.4;border-radius:50%"></div>
      <div style="position:absolute;top:64%;left:22%;width:1.5px;height:1.5px;background:var(--warm-cream);opacity:.25;border-radius:50%"></div>
      <div style="position:absolute;top:20%;left:90%;width:2px;height:2px;background:var(--warm-cream);opacity:.3;border-radius:50%"></div>
      <div style="position:absolute;top:74%;left:62%;width:1.5px;height:1.5px;background:var(--warm-cream);opacity:.3;border-radius:50%"></div>
    </div>
    <div style="font-size:11px;font-weight:600;letter-spacing:.2em;color:var(--story-yellow);margin-bottom:12px">TEAL GROUND · SUBTLE STARS</div>
    <div style="font-family:var(--font-display);font-size:30px;font-weight:300;line-height:1.1;max-width:520px">English that <em style="font-weight:400">sounds</em> like you — but freer.</div>
    <div style="margin-top:10px;font-size:13px;color:rgba(255,247,232,.65);max-width:480px;line-height:1.5">Used for hero, mentorship card and footer. Stars at ≤ 30 % opacity, behind type, never inside the headline cluster.</div>
  </div>
</body></html>
