<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:24px;font-family:var(--font-body)">
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <span style="font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--deep-teal);background:var(--mist-blue);padding:5px 10px;border-radius:999px">MENTORSHIP</span>
    <span style="font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--warm-cream);background:var(--deep-teal);padding:5px 10px;border-radius:999px">PREMIUM</span>
    <span style="font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);background:var(--story-yellow);padding:5px 10px;border-radius:999px">NEW</span>
    <span style="font-size:12px;font-weight:500;color:var(--ink);background:transparent;padding:5px 10px;border-radius:999px;border:1px solid var(--hairline)">8 weeks · live</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--soft-clay);background:#FAEEE6;padding:5px 10px;border-radius:999px"><span style="width:6px;height:6px;background:var(--soft-clay);border-radius:50%"></span>EDITORIAL</span>
  </div>
  <div style="margin-top:14px;font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">eyebrow · solid · accent · meta · dot-tag</div>
</body></html>
