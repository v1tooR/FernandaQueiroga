<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:24px;font-family:var(--font-body)">
  <div style="display:flex;align-items:center;gap:36px;flex-wrap:wrap;color:var(--deep-teal)">

      <div style="font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.14em">spark</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-family:var(--font-display);font-size:72px;line-height:.6;color:var(--deep-teal);font-weight:400">"</div>
      <div style="font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.14em">quote</div>

      <div style="font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.14em">monogram</div>
    </div>
