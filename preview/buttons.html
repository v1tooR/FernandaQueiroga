<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:28px 24px;font-family:var(--font-body)">
  <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
    <button style="font-family:var(--font-body);font-size:15px;font-weight:600;color:var(--ink);background:var(--story-yellow);border:0;border-radius:12px;padding:14px 22px;cursor:pointer;box-shadow:0 8px 24px -10px rgba(242,194,48,.6)">Apply for Mentorship →</button>
    <button style="font-family:var(--font-body);font-size:15px;font-weight:500;color:var(--deep-teal);background:transparent;border:1.5px solid var(--deep-teal);border-radius:12px;padding:13px 22px;cursor:pointer">Join the next group</button>
    <button style="font-family:var(--font-body);font-size:14px;font-weight:600;color:var(--deep-teal);background:transparent;border:0;padding:8px 4px;cursor:pointer;text-decoration:underline;text-decoration-color:var(--burnt-gold);text-decoration-thickness:2px;text-underline-offset:6px">Read the letter</button>
  </div>
  <div style="margin-top:14px;font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">primary · secondary outlined · text/link</div>
</body></html>
