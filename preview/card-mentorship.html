<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:24px;font-family:var(--font-body)">
  <div style="position:relative;background:linear-gradient(180deg,#1B4A55 0%,#173F49 55%,#0E2C34 100%);border-radius:32px;padding:36px;color:var(--warm-cream);overflow:hidden;box-shadow:0 24px 48px -16px rgba(14,44,52,.28)">
    <div style="position:absolute;top:24px;right:28px;width:8px;height:8px;background:var(--story-yellow);border-radius:50%;box-shadow:0 0 0 6px rgba(242,194,48,.18)"></div>
    <div style="font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--story-yellow);margin-bottom:14px">BEYONDSPEAKING · MENTORSHIP</div>
    <div style="font-family:var(--font-display);font-size:30px;font-weight:300;line-height:1.1;max-width:480px;text-wrap:balance">Your English doesn't need to be perfect. It needs to be <em style="font-weight:400">yours</em>.</div>
    <div style="margin-top:14px;font-size:14px;color:rgba(255,247,232,.78);max-width:460px;line-height:1.55">A mentorship for Brazilians ready to speak English with more confidence, depth and direction.</div>
    <div style="margin-top:22px;display:flex;gap:12px;align-items:center">
      <button style="font-family:var(--font-body);font-size:14px;font-weight:600;color:var(--ink);background:var(--story-yellow);border:0;border-radius:12px;padding:12px 18px;cursor:pointer">Apply for Mentorship →</button>
      <span style="font-size:12px;color:rgba(255,247,232,.55)">Limited spots · 2026 intake</span>
    </div>
  </div>
</body></html>
