<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:24px;font-family:var(--font-body)">
  <div style="background:#FAEEE6;border-radius:20px;padding:28px;box-shadow:inset 0 0 0 1px rgba(199,123,90,.18);position:relative;overflow:hidden">
    <div style="position:absolute;top:-30px;right:-30px;font-family:var(--font-display);font-size:200px;line-height:.7;color:rgba(199,123,90,.16);font-weight:400">“</div>
    <div style="font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--soft-clay);margin-bottom:12px">THE BEYONDLETTER</div>
    <div style="font-family:var(--font-display);font-size:24px;font-weight:300;font-style:italic;color:var(--deep-teal);line-height:1.2;max-width:380px">A letter on language, presence and the slow art of fluency.</div>
    <div style="margin-top:10px;font-size:14px;color:var(--fg-2);max-width:420px;line-height:1.55">One thoughtful note from Fernanda, every other Sunday. No promotions, no noise.</div>
    <form style="margin-top:18px;display:flex;gap:8px;max-width:360px">
      <input placeholder="your@email.com" style="flex:1;font-family:var(--font-body);font-size:14px;color:var(--ink);background:var(--white-warm);border:1px solid rgba(199,123,90,.3);border-radius:12px;padding:11px 14px;outline:none">
      <button style="font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--white-warm);background:var(--soft-clay);border:0;border-radius:12px;padding:11px 16px;cursor:pointer;white-space:nowrap">Subscribe</button>
    </form>
  </div>
</body></html>
