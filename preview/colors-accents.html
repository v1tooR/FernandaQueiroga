<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:20px;font-family:var(--font-body)">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="height:78px;border-radius:12px;background:#F2C230;box-shadow:var(--shadow-inset-line)"></div>
      <div style="display:flex;justify-content:space-between;font-size:12px"><span style="font-weight:600;color:var(--ink)">Story Yellow</span><span style="color:var(--fg-3);font-family:var(--font-mono)">#F2C230</span></div>
      <div style="font-size:11px;color:var(--fg-3);line-height:1.4;margin-top:-2px">CTA fill only — never as a background plane.</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="height:78px;border-radius:12px;background:#C9942E;box-shadow:var(--shadow-inset-line)"></div>
      <div style="display:flex;justify-content:space-between;font-size:12px"><span style="font-weight:600;color:var(--ink)">Burnt Gold</span><span style="color:var(--fg-3);font-family:var(--font-mono)">#C9942E</span></div>
      <div style="font-size:11px;color:var(--fg-3);line-height:1.4;margin-top:-2px">Underlines, focus rings, small marks.</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="height:78px;border-radius:12px;background:#C77B5A;box-shadow:var(--shadow-inset-line)"></div>
      <div style="display:flex;justify-content:space-between;font-size:12px"><span style="font-weight:600;color:var(--ink)">Soft Clay</span><span style="color:var(--fg-3);font-family:var(--font-mono)">#C77B5A</span></div>
      <div style="font-size:11px;color:var(--fg-3);line-height:1.4;margin-top:-2px">Warmth accent. Pairs with teal on cream.</div>
    </div>
  </div>
</body></html>
