<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:20px;font-family:var(--font-body)">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    <!-- Each swatch: chip + label + hex -->
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="height:78px;border-radius:12px;background:#173F49;box-shadow:var(--shadow-inset-line)"></div>
      <div style="display:flex;justify-content:space-between;font-size:12px"><span style="font-weight:600;color:var(--ink)">Deep Teal</span><span style="color:var(--fg-3);font-family:var(--font-mono)">#173F49</span></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="height:78px;border-radius:12px;background:#0E2C34;box-shadow:var(--shadow-inset-line)"></div>
      <div style="display:flex;justify-content:space-between;font-size:12px"><span style="font-weight:600;color:var(--ink)">Midnight Teal</span><span style="color:var(--fg-3);font-family:var(--font-mono)">#0E2C34</span></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="height:78px;border-radius:12px;background:#14282F;box-shadow:var(--shadow-inset-line)"></div>
      <div style="display:flex;justify-content:space-between;font-size:12px"><span style="font-weight:600;color:var(--ink)">Ink</span><span style="color:var(--fg-3);font-family:var(--font-mono)">#14282F</span></div>
    </div>
  </div>
</body></html>
