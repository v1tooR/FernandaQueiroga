<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:20px;font-family:var(--font-body)">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="height:78px;border-radius:12px;background:#FFF7E8;box-shadow:var(--shadow-inset-line)"></div>
      <div style="display:flex;justify-content:space-between;font-size:12px"><span style="font-weight:600;color:var(--ink)">Warm Cream</span><span style="color:var(--fg-3);font-family:var(--font-mono)">#FFF7E8</span></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="height:78px;border-radius:12px;background:#FFFDF8;box-shadow:var(--shadow-inset-line)"></div>
      <div style="display:flex;justify-content:space-between;font-size:12px"><span style="font-weight:600;color:var(--ink)">White Warm</span><span style="color:var(--fg-3);font-family:var(--font-mono)">#FFFDF8</span></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="height:78px;border-radius:12px;background:#D8E8EA;box-shadow:var(--shadow-inset-line)"></div>
      <div style="display:flex;justify-content:space-between;font-size:12px"><span style="font-weight:600;color:var(--ink)">Mist Blue</span><span style="color:var(--fg-3);font-family:var(--font-mono)">#D8E8EA</span></div>
    </div>
  </div>
</body></html>
