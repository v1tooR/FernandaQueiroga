<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:24px;font-family:var(--font-body)">
  <div style="display:flex;flex-direction:column;gap:12px;max-width:480px">
    <div>
      <div style="font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-3);margin-bottom:6px">EMAIL</div>
      <input value="fernanda@beyondspeaking.com" style="width:100%;box-sizing:border-box;font-family:var(--font-body);font-size:15px;color:var(--ink);background:var(--white-warm);border:1px solid var(--hairline);border-radius:12px;padding:14px 16px;outline:none;box-shadow:var(--shadow-sm)">
    </div>
    <div>
      <div style="font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-3);margin-bottom:6px">WHAT WOULD YOU LIKE TO WORK ON?</div>
      <textarea rows="2" style="width:100%;box-sizing:border-box;font-family:var(--font-body);font-size:15px;color:var(--ink);background:var(--white-warm);border:1px solid var(--hairline);border-radius:12px;padding:12px 16px;outline:none;resize:none;line-height:1.5">Confidence in meetings — I lead a team and still hesitate when I speak.</textarea>
    </div>
  </div>
</body></html>
