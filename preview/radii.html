<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:24px;font-family:var(--font-body)">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;align-items:end">
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:78px;height:60px;background:var(--white-warm);border:1px solid var(--hairline);border-radius:6px"></div>
      <div style="font-size:11px;color:var(--fg-2);font-family:var(--font-mono)">sm · 6</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:78px;height:60px;background:var(--white-warm);border:1px solid var(--hairline);border-radius:12px"></div>
      <div style="font-size:11px;color:var(--fg-2);font-family:var(--font-mono)">md · 12</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:78px;height:60px;background:var(--white-warm);border:1px solid var(--hairline);border-radius:20px"></div>
      <div style="font-size:11px;color:var(--fg-2);font-family:var(--font-mono)">lg · 20</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:78px;height:60px;background:var(--white-warm);border:1px solid var(--hairline);border-radius:32px"></div>
      <div style="font-size:11px;color:var(--fg-2);font-family:var(--font-mono)">xl · 32</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:78px;height:34px;background:var(--white-warm);border:1px solid var(--hairline);border-radius:999px"></div>
      <div style="font-size:11px;color:var(--fg-2);font-family:var(--font-mono)">pill</div>
    </div>
  </div>
</body></html>
