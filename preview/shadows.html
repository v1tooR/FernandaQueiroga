<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:28px 24px;font-family:var(--font-body)">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;align-items:center">
    <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
      <div style="width:78px;height:54px;background:var(--white-warm);border-radius:12px;box-shadow:0 1px 2px rgba(20,40,47,.06)"></div>
      <div style="font-size:11px;color:var(--fg-2);font-family:var(--font-mono)">sm — inputs</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
      <div style="width:78px;height:54px;background:var(--white-warm);border-radius:12px;box-shadow:0 8px 24px -8px rgba(20,40,47,.12)"></div>
      <div style="font-size:11px;color:var(--fg-2);font-family:var(--font-mono)">md — cards</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
      <div style="width:78px;height:54px;background:var(--white-warm);border-radius:12px;box-shadow:0 24px 48px -16px rgba(14,44,52,.18)"></div>
      <div style="font-size:11px;color:var(--fg-2);font-family:var(--font-mono)">lg — premium</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
      <div style="width:78px;height:54px;background:var(--white-warm);border-radius:12px;box-shadow:inset 0 0 0 1px rgba(20,40,47,.06)"></div>
      <div style="font-size:11px;color:var(--fg-2);font-family:var(--font-mono)">inset · paper edge</div>
    </div>
  </div>
</body></html>
