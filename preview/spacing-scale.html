<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="margin:0;background:var(--warm-cream);padding:24px;font-family:var(--font-body)">
  <div style="display:flex;align-items:flex-end;gap:18px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:4px;height:4px;background:var(--deep-teal);border-radius:2px"></div><div style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">4</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:8px;height:8px;background:var(--deep-teal);border-radius:2px"></div><div style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">8</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:12px;height:12px;background:var(--deep-teal);border-radius:3px"></div><div style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">12</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:16px;background:var(--deep-teal);border-radius:3px"></div><div style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">16</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:24px;height:24px;background:var(--deep-teal);border-radius:4px"></div><div style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">24</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:32px;height:32px;background:var(--deep-teal);border-radius:4px"></div><div style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">32</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:48px;height:48px;background:var(--deep-teal);border-radius:6px"></div><div style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">48</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:64px;height:64px;background:var(--deep-teal);border-radius:8px"></div><div style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">64</div></div>
  </div>
</body></html>
